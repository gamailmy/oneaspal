                  <FormSelect label="Jenis Sepatu" value={editingGear.shoeType || ''} onChange={(e)=>setEditingGear({...editingGear, shoeType: e.target.value})}><option value="">Pilih Jenis Sepatu</option><option>Boots</option><option>Sneaker</option><option>Pantofel</option></FormSelect>
                  <FormSelect label="Model Sepatu" value={editingGear.shoeModel || ''} onChange={(e)=>setEditingGear({...editingGear, shoeModel: e.target.value})}><option value="">Pilih Model Sepatu</option><option>Kulit</option><option>Kanvas</option><option>Mesh</option></FormSelect>
                  <button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Simpan Safety Gear</button>
                </form>
              </div>
            </div>
          )}

          {showConfirmRegModal && confirmRegData && (
            <div className="absolute inset-0 bg-slate-900/60 backdrop-blur-sm z-[60] flex items-end md:items-center justify-center p-4" onClick={()=>setShowConfirmRegModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl max-h-[90vh] overflow-y-auto scrollbar-none" onClick={e=>e.stopPropagation()}>
                <div className="flex flex-col items-center text-center mb-4"><div className="w-12 h-12 rounded-full bg-amber-100 flex items-center justify-center text-amber-500 mb-2"><I.ScrollText /></div><h3 className="text-lg font-black text-slate-900">Konfirmasi Data & Aturan</h3><p className="text-[10px] text-slate-500 font-medium">Pastikan data Anda benar dan setuju dengan aturan komunitas.</p></div>
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-4 space-y-1.5 text-xs text-slate-700 font-medium mb-4"><p className="text-[10px] font-black text-slate-400 uppercase tracking-wider mb-1">Data Diri</p><div className="flex justify-between"><span className="font-bold text-slate-500">Nama</span><span>{confirmRegData.name}</span></div><div className="flex justify-between"><span className="font-bold text-slate-500">Jenis Kelamin</span><span>{confirmRegData.gender}</span></div><div className="flex justify-between"><span className="font-bold text-slate-500">Kota</span><span>{confirmRegData.city}</span></div><div className="flex justify-between"><span className="font-bold text-slate-500">No HP</span><span>{confirmRegData.phone}</span></div><div className="flex justify-between"><span className="font-bold text-slate-500">Username</span><span>{confirmRegData.username}</span></div><div className="border-t border-slate-200 my-2"></div><p className="text-[10px] font-black text-amber-500 uppercase tracking-wider mb-1">Data Garasi</p><div className="flex justify-between"><span className="font-bold text-slate-500">Motor</span><span>{confirmRegData.bikeBrand} {confirmRegData.bikeModel}</span></div><div className="flex justify-between"><span className="font-bold text-slate-500">Plat Nomor</span><span>{confirmRegData.bikePlate}</span></div><div className="flex justify-between"><span className="font-bold text-slate-500">Spek</span><span>{confirmRegData.bikeCategory} • {confirmRegData.bikeEngine}</span></div></div>
                <div className="bg-rose-50 border border-rose-100 rounded-2xl p-3 mb-4"><p className="text-[10px] font-black text-rose-600 uppercase mb-1.5 flex items-center"><I.ShieldCheck className="w-3.5 h-3.5 mr-1" /> Aturan & Kode Etik Anggota</p><ul className="text-[10px] text-rose-700 font-medium space-y-1 list-disc list-inside leading-relaxed"><li>Wajib mematuhi rambu dan hukum lalu lintas yang berlaku.</li><li>Mengutamakan keselamatan berkendara (Safety Riding) dan dilarang mengebut di jalan umum.</li><li>Menjaga nama baik komunitas serta menjaga kekompakan antar anggota.</li><li>Data yang diinput wajib benar. Jika terbukti palsu, keanggotaan akan dibatalkan.</li></ul></div>
                <div className="grid grid-cols-2 gap-2"><button onClick={()=>{setShowConfirmRegModal(false);setConfirmRegData(null);}} className="w-full bg-slate-100 text-slate-600 font-bold text-xs py-3 rounded-xl active:scale-95 transition">Batal</button><button onClick={finalReg} className="w-full bg-gradient-to-r from-slate-800 to-amber-500 text-white font-bold text-xs py-3 rounded-xl active:scale-95 transition">OK, Setuju & Kirim</button></div>
              </div>
            </div>
          )}

          {showEditBikeModal && editingBike && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4" onClick={()=>setShowEditBikeModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-black text-slate-900 mb-4">Edit Data Motor</h3>
                <form onSubmit={upBike} className="space-y-3"><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Nama Motor</label><input type="text" value={editingBike.name} onChange={(e)=>setEditingBike({...editingBike,name:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Plat Nomor</label><input type="text" maxLength="8" value={editingBike.plate} onChange={(e)=>{let v=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');setEditingBike({...editingBike,plate:v});}} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none uppercase" /></div><div className="grid grid-cols-2 gap-2"><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Kapasitas (CC)</label><select value={editingBike.engine} onChange={(e)=>setEditingBike({...editingBike,engine:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-semibold focus:outline-none"><option value="">Pilih CC</option><option value="110cc">110 cc</option><option value="125cc">125 cc</option><option value="150cc">150 cc</option><option value="160cc">160 cc</option><option value="200cc">200 cc</option><option value="250cc">250 cc</option></select></div><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Jenis</label><select value={editingBike.type} onChange={(e)=>setEditingBike({...editingBike,type:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none"><option>Sport</option><option>Adventure</option><option>Matic</option><option>Classic</option><option>Bebek</option><option>Vespa</option></select></div></div><button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Simpan Perubahan</button></form>
              </div>
            </div>
          )}
          {showEditProfileModal && editingProfile && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4" onClick={()=>setShowEditProfileModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-black text-slate-900 mb-4">Edit Data Diri</h3>
                <form onSubmit={upProf} className="space-y-3">
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Nama Lengkap</label><input type="text" value={editingProfile.name} onChange={(e)=>setEditingProfile({...editingProfile,name:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div>
                  <div className="grid grid-cols-2 gap-2">
                    <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Jenis Kelamin</label><select value={editingProfile.gender} onChange={(e)=>setEditingProfile({...editingProfile,gender:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-semibold focus:outline-none"><option>LAKI-LAKI</option><option>PEREMPUAN</option></select></div>
                    <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Kota Asal</label><input type="text" value={editingProfile.city} onChange={(e)=>setEditingProfile({...editingProfile,city:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div>
                  </div>
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">No. HP (WhatsApp)</label><input type="tel" value={editingProfile.phone} onChange={(e)=>setEditingProfile({...editingProfile,phone:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div>
                  <button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Simpan Perubahan</button>
                </form>
              </div>
            </div>
          )}
          {showAddGroupModal && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4" onClick={()=>setShowAddGroupModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-black text-slate-900 mb-4">Buat Tema Obrolan</h3>
                <form onSubmit={mkChat} className="space-y-3"><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Nama Tema</label><input type="text" value={newGroup.name} onChange={(e)=>setNewGroup({...newGroup,name:e.target.value})} placeholder="Contoh: Touring Bogor" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Deskripsi Singkat</label><input type="text" value={newGroup.desc} onChange={(e)=>setNewGroup({...newGroup,desc:e.target.value})} placeholder="Deskripsi obrolan" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div><button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Buat Grup</button></form>
              </div>
            </div>
          )}
          {showAddEventModal && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4" onClick={()=>setShowAddEventModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-black text-slate-900 mb-4">Tambah Event Baru</h3>
                <form onSubmit={addEvt} className="space-y-3"><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Judul Event</label><input type="text" value={newEvent.title} onChange={(e)=>setNewEvent({...newEvent,title:e.target.value})} placeholder="Contoh: Touring Akhir Tahun" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div><div className="grid grid-cols-2 gap-2"><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Tanggal</label><input type="text" value={newEvent.date} onChange={(e)=>setNewEvent({...newEvent,date:e.target.value})} placeholder="25 Des 2026" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Tag</label><select value={newEvent.tag} onChange={(e)=>setNewEvent({...newEvent,tag:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none"><option>Nasional</option><option>Lokal</option><option>Sosial</option></select></div></div><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Tujuan</label><input type="text" value={newEvent.destination} onChange={(e)=>setNewEvent({...newEvent,destination:e.target.value})} placeholder="Contoh: Bandung" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div><button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Publish Event</button></form>
              </div>
            </div>
          )}
          {showAddAnnouncementModal && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4" onClick={()=>setShowAddAnnouncementModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-black text-slate-900 mb-4 flex items-center space-x-2"><I.Megaphone className="w-5 h-5 text-amber-500" /> Buat Pengumuman</h3>
                <form onSubmit={addAnn} className="space-y-3"><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Judul Pengumuman</label><input type="text" value={newAnnouncement.title} onChange={(e)=>setNewAnnouncement({...newAnnouncement,title:e.target.value})} placeholder="Contoh: Touring Ditunda" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" required /></div><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Isi Pengumuman</label><textarea value={newAnnouncement.content} onChange={(e)=>setNewAnnouncement({...newAnnouncement,content:e.target.value})} placeholder="Tulis isi pengumuman di sini..." rows="4" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none resize-none" required></textarea></div><button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Publish Pengumuman</button></form>
              </div>
            </div>
          )}

        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
</body>
</html>
