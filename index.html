    const calculateTimeLeft = (targetDate) => {
      const difference = +new Date(targetDate) - +new Date();
      let timeLeft = {};
      if (difference > 0) {
        timeLeft = { days: Math.floor(difference / (1000 * 60 * 60 * 24)), hours: Math.floor((difference / (1000 * 60 * 60)) % 24), minutes: Math.floor((difference / 1000 / 60) % 60), seconds: Math.floor((difference / 1000) % 60), total: difference };
      } else {
        timeLeft = { days: 0, hours: 0, minutes: 0, seconds: 0, total: 0 };
      }
      return timeLeft;
    };

    const CountdownTimer = ({ targetDate }) => {
      const [timeLeft, setTimeLeft] = useState(calculateTimeLeft(targetDate));
      useEffect(() => {
        const timer = setInterval(() => { setTimeLeft(calculateTimeLeft(targetDate)); }, 1000);
        return () => clearInterval(timer);
      }, [targetDate]);
      if (timeLeft.total <= 0) {
        return <span className="text-[10px] font-bold text-rose-600 bg-rose-100 px-3 py-1 rounded-full">Sedang Berlangsung/Selesai</span>;
      }
      const timeBlocks = [ { label: 'Hari', value: timeLeft.days }, { label: 'Jam', value: timeLeft.hours }, { label: 'Menit', value: timeLeft.minutes }, { label: 'Detik', value: timeLeft.seconds } ];
      return (
        <div className="flex space-x-1.5 mt-3">
          {timeBlocks.map((block, i) => (
            <div key={i} className="flex flex-col items-center bg-slate-900 text-white px-2 py-1 rounded-lg min-w-[36px] shadow-sm">

                  <div className="bg-white/60 border border-white/80 rounded-3xl p-5 shadow-sm space-y-4"><h3 className="font-black text-base text-slate-900 flex items-center space-x-2"><I.Info className="text-amber-500 w-5 h-5" /><span>Profile Club</span></h3><p className="text-xs text-slate-600 font-medium leading-relaxed"><b>One Aspal Club (OAC)</b> adalah komunitas pecinta event kebersamaan dengan mengendarai motor dengan santai dalam menikmati momen. Kami mengutamakan keselamatan, etika berkendara, dan persaudaraan tanpa batas antar pengguna semua jenis kendaraan motor roda dua di jalan raya.</p></div>
                  <div className="bg-white/60 border border-white/80 rounded-3xl p-5 shadow-sm space-y-4"><h3 className="font-black text-base text-slate-900 flex items-center space-x-2"><I.Award className="text-amber-500 w-5 h-5" /><span>Visi & Misi</span></h3><div className="space-y-3"><div className="bg-amber-50/50 border border-amber-100 rounded-2xl p-3"><p className="text-[10px] font-black text-amber-600 uppercase mb-1">Visi</p><p className="text-xs text-slate-700 font-semibold">one aspal merupakan komunitas pengendara motor roda dua yang menginspirasi dalam aspek tertib lalu lintas, kekeluargaan yang erat, dan kepedulian sosial yang nyata bagi masyarakat luas.</p></div><div className="bg-blue-50/50 border border-blue-100 rounded-2xl p-3"><p className="text-[10px] font-black text-blue-600 uppercase mb-1">Misi</p><ul className="text-xs text-slate-700 font-semibold space-y-1.5 list-disc list-inside"><li>Membangun kekeluargaan antar anggota tanpa batas golongan.</li><li>Meningkatkan budaya safety riding dan kesadaran hukum lalu lintas.</li><li>Mengadakan kegiatan touring tahunan dan aksi sosial.</li></ul></div></div></div>

                    </div>
                    <div className="pt-4 border-t border-slate-100">

                    </div>
                  </div>

                <div className="text-center pt-4 mb-6"><GlassLogo size="w-24 h-24" animate={true} /><h1 className="text-2xl font-black tracking-wider text-slate-900 uppercase mt-4">ONE <span className="text-amber-500">ASPAL</span></h1><p className="text-xs text-slate-500 font-semibold mt-1">{authMode === 'login' ? 'Masuk ke Akun Anda' : 'Gabung Menjadi Anggota'}</p></div>

                      {loginRole === 'admin' ? (<div className="p-3 bg-amber-50 border border-amber-100 rounded-xl text-[10px] text-amber-600 font-semibold flex items-start space-x-2"><I.ShieldCheck className="w-4 h-4 flex-shrink-0 mt-0.5" /><span>Halaman ini khusus untuk Pengurus/Admin. Anggota harap login di tab sebelah.</span></div>) : (<div className="p-3 bg-blue-50 border border-blue-100 rounded-xl text-[10px] text-blue-600 font-semibold flex items-start space-x-2"><I.Info className="w-4 h-4 flex-shrink-0 mt-0.5" /><span>Pastikan akun Anda sudah disetujui Admin sebelum mencoba masuk.</span></div>)}

                        <FormInput label="Kata Sandi" icon={<I.Lock />} type="password" value={password} onChange={(e)=>setPassword(e.target.value)} placeholder="Masukkan kata sandi" required />
                        <button type="submit" className="w-full bg-gradient-to-r from-slate-900 to-slate-800 hover:from-slate-800 hover:to-slate-700 text-white font-bold text-xs py-3.5 rounded-xl shadow-lg active:scale-95 transition flex items-center justify-center space-x-1.5"><I.Lock className="w-4 h-4" /><span>Masuk Aplikasi</span></button>
                      </form>
                      <button onClick={()=>setAuthMode('register')} className="w-full text-[10px] text-blue-500 font-bold hover:underline text-center">Belum punya akun? Daftar Anggota Baru di sini</button>
                    </div>
                  ) : (
                    <div className="space-y-5">
                      <form onSubmit={handleReg} className="space-y-5">
                        <div className="p-3 bg-blue-50 border border-blue-101 rounded-xl text-[10px] text-blue-600 font-semibold flex items-start space-x-2"><I.ShieldCheck className="w-4 h-4 flex-shrink-0 mt-0.5" /><span>Semua form wajib diisi dengan format yang benar.</span></div>
                        <div className="space-y-4">
                          <div className="flex items-center space-x-2 text-slate-400"><I.User className="w-3.5 h-3.5"/><span className="text-[10px] font-bold uppercase tracking-wider">Data Diri</span></div>
                          <FormInput label="Nama Lengkap" icon={<I.User />} type="text" value={regName} onChange={(e)=>setRegName(e.target.value.toUpperCase().replace(/[^A-Z ]/g,'').slice(0,20))} required placeholder="BUDI SETIAWAN" hint="3-20 Huruf Kapital" />
                          <div className="grid grid-cols-2 gap-3">
                            <FormSelect label="Jenis Kelamin" value={regGender} onChange={(e)=>setRegGender(e.target.value)}><option>LAKI-LAKI</option><option>PEREMPUAN</option></FormSelect>
                            <FormSelect label="Kota Asal" icon={<I.MapPin />} value={regCity} onChange={(e)=>setRegCity(e.target.value)} required><option value="">Pilih Kota...</option><option value="JAKARTA">JAKARTA</option><option value="BOGOR">BOGOR</option><option value="DEPOK">DEPOK</option><option value="TANGERANG">TANGERANG</option><option value="BEKASI">BEKASI</option></FormSelect>
                          </div>
                          <FormInput label="No. HP" icon={<I.Phone />} type="tel" value={regPhone} onChange={(e)=>{let v=e.target.value.replace(/[^0-9]/g,'');setRegPhone(v.slice(0,12));}} required placeholder="081234567890" hint="Awali 08, 10-12 digit" />
                          <div className="space-y-1.5">
                            <label className="text-[10px] font-bold text-slate-600 uppercase tracking-wider block">Email</label>

                              <div className="relative flex-1"><span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"><I.Mail /></span><input type="text" value={regEmail} onChange={(e)=>setRegEmail(e.target.value.toLowerCase().replace(/[^a-z0-9._-]/g,''))} required placeholder="nama.email" className="w-full bg-slate-50/80 border border-slate-200 rounded-xl pl-10 pr-3 py-2.5 text-xs font-semibold text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400/30 focus:border-amber-400 focus:bg-white transition-all duration-200"/></div>
                              <select value={regEmailDomain} onChange={(e)=>setRegEmailDomain(e.target.value)} required className="appearance-none w-[45%] bg-slate-50/80 border border-slate-200 rounded-xl pl-3 pr-9 py-2.5 text-xs font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400/30 focus:border-amber-400 focus:bg-white transition-all duration-200"><option value="@gmail.com">@gmail.com</option><option value="@yahoo.com">@yahoo.com</option><option value="@outlook.com">@outlook.com</option><option value="@pu.go.id">@pu.go.id</option></select>
                            </div>
                          </div>
                          <FormSelect label="Status Berkendara" value={regRidingStatus} onChange={(e)=>setRegRidingStatus(e.target.value)} required><option value="">Pilih Status...</option><option value="Pengendara Motor">Pengendara Motor</option><option value="Penumpang Motor">Penumpang Motor</option></FormSelect>
                          <div className="grid grid-cols-2 gap-3">
                            <FormInput label="Username Login" icon={<I.User />} type="text" value={regUsername} onChange={(e)=>setRegUsername(e.target.value)} required placeholder="BudiRider" hint="4-20 Huruf/Angka" />
                            <FormInput label="Kata Sandi" icon={<I.Lock />} type="password" value={regPassword} onChange={(e)=>setRegPassword(e.target.value)} required placeholder="Min 6 karakter" />
                          </div>
                        </div>
                        <div className="space-y-4 pt-2 border-t border-slate-100">
                          <div className="flex items-center space-x-2 text-amber-500 pt-2"><BikeIcon type={regBikeCategory} className="w-4 h-4" /><span className="text-[10px] font-bold uppercase tracking-wider">Data Garasi (Motor)</span></div>
                          <div className="grid grid-cols-2 gap-3">
                            <FormInput label="Merek Motor" icon={<BikeIcon type={regBikeCategory} className="w-4 h-4" />} type="text" value={regBikeBrand} onChange={(e)=>setRegBikeBrand(e.target.value.toUpperCase().replace(/[^A-Z ]/g,'').slice(0,10))} required placeholder="HONDA" hint="4-10 Kapital" />
                            <FormInput label="Tipe Motor" icon={<BikeIcon type={regBikeCategory} className="w-4 h-4" />} type="text" value={regBikeModel} onChange={(e)=>setRegBikeModel(e.target.value.toUpperCase().replace(/[^A-Z0-9 -]/g,'').slice(0,12))} required placeholder="CBR-250 RR" hint="Pakai spasi/- maks 12" />
                          </div>
                          <div className="grid grid-cols-2 gap-3">
                            <FormInput label="Plat Nomor" icon={<I.MapPin />} type="text" maxLength="8" value={regBikePlate} onChange={(e)=>{let v=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');setRegBikePlate(v);}} required placeholder="B1234ABC" hint="7-8 digit" />
                            <FormSelect label="Kapasitas (CC)" value={regBikeEngine?`${regBikeEngine}cc`:''} onChange={(e)=>setRegBikeEngine(e.target.value.replace('cc',''))} required><option value="">Pilih CC</option><option value="110cc">110 cc</option><option value="125cc">125 cc</option><option value="150cc">150 cc</option><option value="160cc">160 cc</option><option value="200cc">200 cc</option><option value="250cc">250 cc</option></FormSelect>
                          </div>
                          <FormSelect label="Jenis Motor" icon={<BikeIcon type={regBikeCategory} className="w-4 h-4" />} value={regBikeCategory} onChange={(e)=>setRegBikeCategory(e.target.value)} required><option>Matic</option><option>Bebek</option><option>Sport</option><option>Trail</option><option>Classic (Custom)</option></FormSelect>
                        </div>

                      </form>
                      <button onClick={()=>setAuthMode('login')} className="w-full text-[10px] text-slate-500 font-bold hover:underline text-center">Sudah punya akun? Masuk di sini</button>
                    </div>

                <div className="flex items-center space-x-2.5"><GlassLogoMini /><div><h1 className="text-sm font-black tracking-wider text-slate-900 uppercase flex items-center">ONE <span className="text-amber-500 ml-1">ASPAL</span></h1><span className="text-[10px] text-slate-500 font-semibold block -mt-1">{currentUser.role==='Admin'?'Sistem Backend':`ID: ${currentUser.memberId || currentUser.id}`}</span></div></div>
                <div className="flex items-center space-x-2 relative">
                  <button onClick={()=>setShowNotifPanel(!showNotifPanel)} className="relative p-2 rounded-full bg-slate-100 hover:bg-slate-200 transition text-slate-600 active:scale-90"><I.Bell />{un>0&&<span className="absolute top-0 right-0 w-4 h-4 bg-rose-500 text-white text-[8px] font-bold rounded-full flex items-center justify-center animate-pulse">{un}</span>}</button>

                </div>
              </div>

              <div className="flex-1 overflow-y-auto pb-24 px-5 pt-5 space-y-6 scrollbar-none" onClick={()=>setShowNotifPanel(false)}>

                    {activeTab==='home' && (
                      <div className="space-y-4">

                        {renderForum()}
                      </div>

                <form onSubmit={upBike} className="space-y-3">
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Nama Motor</label><input type="text" value={editingBike.name} onChange={(e)=>setEditingBike({...editingBike,name:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div>
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Plat Nomor</label><input type="text" maxLength="8" value={editingBike.plate} onChange={(e)=>{let v=e.target.value.toUpperCase().replace(/[^A-Z0-9]/g,'');setEditingBike({...editingBike,plate:v});}} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none uppercase" /></div>
                  <div className="grid grid-cols-2 gap-2">
                    <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Kapasitas (CC)</label><select value={editingBike.engine} onChange={(e)=>setEditingBike({...editingBike,engine:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-semibold focus:outline-none"><option value="">Pilih CC</option><option value="110cc">110 cc</option><option value="125cc">125 cc</option><option value="150cc">150 cc</option><option value="160cc">160 cc</option><option value="200cc">200 cc</option><option value="250cc">250 cc</option></select></div>
                    <div className="relative"><label className="text-[11px] font-bold text-slate-500 block mb-1">Jenis</label><div className="relative"><span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400 mt-[14px]"><BikeIcon type={editingBike.type} className="w-4 h-4" /></span><select value={editingBike.type} onChange={(e)=>setEditingBike({...editingBike,type:e.target.value})} className="appearance-none w-full bg-slate-50 border border-slate-200 rounded-xl pl-10 pr-9 py-2.5 text-xs font-semibold focus:outline-none"><option>Matic</option><option>Bebek</option><option>Sport</option><option>Trail</option><option>Classic (Custom)</option></select><span className="absolute right-3.5 top-1/2 -translate-y-1/2 text-slate-400 pointer-events-none mt-[14px]"><I.ChevronDown /></span></div></div>
                  </div>
                  <button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Simpan Perubahan</button>
                </form>
              </div>
            </div>
          )}
          
          {/* Modal Edit Profil */}
          {showEditProfileModal && editingProfile && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4 animate-fade-in" onClick={()=>setShowEditProfileModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-scale-in" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-black text-slate-900 mb-4">Edit Data Diri</h3>
                <form onSubmit={upProf} className="space-y-3">
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Nama Lengkap</label><input type="text" value={editingProfile.name} onChange={(e)=>setEditingProfile({...editingProfile,name:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div>
                  <div className="grid grid-cols-2 gap-2"><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Jenis Kelamin</label><select value={editingProfile.gender} onChange={(e)=>setEditingProfile({...editingProfile,gender:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-3 py-2.5 text-xs font-semibold focus:outline-none"><option>LAKI-LAKI</option><option>PEREMPUAN</option></select></div><div><label className="text-[11px] font-bold text-slate-500 block mb-1">Kota Asal</label><input type="text" value={editingProfile.city} onChange={(e)=>setEditingProfile({...editingProfile,city:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div></div>
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">No. HP (WhatsApp)</label><input type="tel" value={editingProfile.phone} onChange={(e)=>setEditingProfile({...editingProfile,phone:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" /></div>
                  <div className="space-y-1.5"><label className="text-[10px] font-bold text-slate-600 uppercase tracking-wider block">Email</label><div className="flex space-x-2"><div className="relative flex-1"><span className="absolute left-3.5 top-1/2 -translate-y-1/2 text-slate-400"><I.Mail /></span><input type="text" value={editingProfile.email || ''} onChange={(e)=>setEditingProfile({...editingProfile, email: e.target.value.toLowerCase().replace(/[^a-z0-9._-]/g,'')})} required placeholder="nama.email" className="w-full bg-slate-50/80 border border-slate-200 rounded-xl pl-10 pr-3 py-2.5 text-xs font-semibold text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400/30 focus:border-amber-400 focus:bg-white transition-all duration-200"/></div><select value={editingProfile.emailDomain || '@gmail.com'} onChange={(e)=>setEditingProfile({...editingProfile, emailDomain: e.target.value})} required className="appearance-none w-[45%] bg-slate-50/80 border border-slate-200 rounded-xl pl-3 pr-9 py-2.5 text-xs font-semibold text-slate-800 focus:outline-none focus:ring-2 focus:ring-amber-400/30 focus:border-amber-400 focus:bg-white transition-all duration-200"><option value="@gmail.com">@gmail.com</option><option value="@yahoo.com">@yahoo.com</option><option value="@outlook.com">@outlook.com</option><option value="@pu.go.id">@pu.go.id</option></select></div></div>
                  <FormSelect label="Status Berkendara" value={editingProfile.ridingStatus || ''} onChange={(e)=>setEditingProfile({...editingProfile, ridingStatus: e.target.value})} required><option value="">Pilih Status...</option><option value="Pengendara Motor">Pengendara Motor</option><option value="Penumpang Motor">Penumpang Motor</option></FormSelect>
                  <button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Simpan Perubahan</button>
                </form>
              </div>
            </div>
          )}
          
          {/* Modal Tambah Pengumuman */}
          {showAddAnnouncementModal && (
            <div className="absolute inset-0 bg-slate-900/50 backdrop-blur-sm z-50 flex items-end md:items-center justify-center p-4 animate-fade-in" onClick={()=>setShowAddAnnouncementModal(false)}>
              <div className="bg-white rounded-3xl p-6 w-full max-w-sm shadow-2xl animate-scale-in" onClick={e=>e.stopPropagation()}>
                <h3 className="text-lg font-black text-slate-900 mb-4 flex items-center space-x-2"><I.Megaphone className="w-5 h-5 text-amber-500" /> Buat Pengumuman</h3>
                <form onSubmit={(e)=>{e.preventDefault(); if(!newAnnouncement.title||!newAnnouncement.content){addN('Judul dan isi wajib diisi!','error');return;} setAnnouncements([{id:Date.now(),title:newAnnouncement.title,content:newAnnouncement.content,date:new Date().toLocaleDateString('id-ID',{day:'2-digit',month:'long',year:'numeric'}),author:currentUser.name},...announcements]); setShowAddAnnouncementModal(false); setNewAnnouncement({title:'',content:''}); addN('Pengumuman dipublish!','success');}} className="space-y-3">
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Judul</label><input type="text" value={newAnnouncement.title} onChange={(e)=>setNewAnnouncement({...newAnnouncement,title:e.target.value})} className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none" required /></div>
                  <div><label className="text-[11px] font-bold text-slate-500 block mb-1">Isi</label><textarea value={newAnnouncement.content} onChange={(e)=>setNewAnnouncement({...newAnnouncement,content:e.target.value})} rows="4" className="w-full bg-slate-50 border border-slate-200 rounded-xl px-4 py-2.5 text-xs font-semibold focus:outline-none resize-none" required></textarea></div>
                  <button type="submit" className="w-full bg-slate-900 text-white font-bold text-xs py-3 rounded-xl mt-2 active:scale-95">Publish</button>
                </form>
              </div>
            </div>
          )}

          {/* === MODAL PREVIEW KARTU === */}
          {showCardPreview && (
            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md z-[70] flex items-center justify-center p-4 animate-fade-in" onClick={()=>setShowCardPreview(false)}>
              <div className="bg-white rounded-3xl p-5 w-full max-w-sm shadow-2xl animate-scale-in max-h-[90vh] overflow-y-auto scrollbar-none" onClick={e=>e.stopPropagation()}>
                <div className="flex justify-between items-center mb-4">
                  <h3 className="text-base font-black text-slate-900 flex items-center space-x-2">
                    <I.Eye className="w-5 h-5 text-amber-500" />
                    <span>Preview Kartu Anggota</span>
                  </h3>
                  <button onClick={()=>setShowCardPreview(false)} className="p-1.5 text-slate-400 hover:text-slate-700 bg-slate-100 rounded-full">
                    <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><line x1="18" x2="6" y1="6" y2="18"/><line x1="6" x2="18" y1="6" y2="18"/></svg>
                  </button>
                </div>
                
                <p className="text-[11px] text-slate-500 font-medium mb-3 text-center">
                  Pastikan tampilan kartu sudah sesuai sebelum {previewAction === 'download' ? 'diunduh' : 'dibagikan'}
                </p>
                
                {/* Preview Kartu */}
                <div className="bg-slate-100 p-3 rounded-2xl mb-4">
                  <div className="w-full relative rounded-[16px] overflow-hidden shadow-xl border border-slate-300/50 card-font" style={{background: 'linear-gradient(135deg, #ebebeb 0%, #f5f5f5 25%, #e0e0e0 50%, #f5f5f5 75%, #ebebeb 100%)', height: '220px'}}>
                    <div className="absolute -top-10 -right-10 w-32 h-32 bg-white/40 rounded-full blur-3xl"></div>
                    <div className="absolute -bottom-10 -left-10 w-32 h-32 bg-slate-400/20 rounded-full blur-3xl"></div>
                    <div className="absolute top-0 left-0 right-0 h-1 bg-gradient-to-r from-slate-400 via-white to-slate-400"></div>
                    
                    <div className="relative z-10 p-4 h-full flex flex-col justify-between text-slate-800">
                      <div className="flex justify-between items-start">
                        <div className="pr-2 flex-1">
                          <h1 className="text-base font-black tracking-wider uppercase text-slate-800 leading-none">ONE ASPAL CLUB</h1>
                          <p className="text-[8px] font-bold tracking-[0.15em] text-slate-500 uppercase mt-1">Riders Card Official Member</p>
                          <div className="mt-1.5">
                            <p className="text-[7px] text-slate-500 font-bold uppercase tracking-widest"></p>
                            <p className="text-xs font-mono font-extrabold text-slate-800 tracking-wider">ID: {mpd.memberId}</p>
                          </div>
                        </div>
                        <div className="w-12 h-12 rounded-full bg-white p-0.5 shadow-lg flex items-center justify-center overflow-hidden flex-shrink-0 ring-2 ring-slate-300/50"><img crossOrigin="anonymous" src={LOGO_URL} alt="Logo" className="w-full h-full object-cover rounded-full" /></div>
                      </div>
                      
                      <div className="space-y-0.5 flex-1 flex flex-col justify-center mt-1">
                        <div>
                          <p className="text-sm font-extrabold tracking-normal uppercase leading-tight break-words text-slate-900">{mpd.name}</p>
                          <p className="text-[10px] font-bold text-slate-700 break-words leading-tight">{primaryBikeText}</p>
                        </div>
                        <div className="flex gap-2 mt-1">
                          <div className="flex-1">
                            <p className="text-[7px] text-slate-500 font-bold uppercase tracking-widest"></p>
                            <p className="text-[10px] font-bold text-slate-700 break-words leading-tight">{mpd.city}</p>
                          </div>
                          <div className="flex-1">
                            
                          </div>
                        </div>
                      </div>

                      <div className="flex justify-between items-end border-t border-slate-300/50 pt-2">
                        <div className="flex items-center space-x-1">
                          
                          <p className="text-[7px] text-slate-600 font-semibold">Berlaku s/d {validThruText}</p>
                        </div>
                        <p className="text-[7px] text-slate-500 font-bold uppercase tracking-widest">driver's license (SIM C)</p>
                      </div>
                    </div>
                  </div>
                </div>
                
                {/* Format Selection - Only show for download action */}
                {previewAction === 'download' && (
                  <div className="mb-4">
                    <p className="text-[10px] font-bold text-slate-600 uppercase tracking-wider mb-2">Pilih Format File:</p>
                    <div className="grid grid-cols-2 gap-2">
                      <button
                        onClick={() => setCardFormat('jpg')}
                        className={`relative p-3 rounded-2xl border-2 transition-all duration-200 ${cardFormat === 'jpg' ? 'border-amber-500 bg-amber-50 shadow-md' : 'border-slate-200 bg-white hover:border-slate-300'}`}
                      >
                        <div className="flex flex-col items-center space-y-1">
                          <I.Image className={`w-6 h-6 ${cardFormat === 'jpg' ? 'text-amber-500' : 'text-slate-400'}`} />
                          <span className={`text-xs font-bold ${cardFormat === 'jpg' ? 'text-amber-600' : 'text-slate-600'}`}>JPG</span>
                          <span className="text-[8px] text-slate-400 font-medium text-center leading-tight">Gambar<br/>Simpan ke Galeri</span>
                        </div>
                        {cardFormat === 'jpg' && (
                          <div className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-amber-500 rounded-full flex items-center justify-center">
                            <I.CheckCircle2 className="w-3.5 h-3.5 text-white" />
                          </div>
                        )}
                      </button>
                      <button
                        onClick={() => setCardFormat('pdf')}
                        className={`relative p-3 rounded-2xl border-2 transition-all duration-200 ${cardFormat === 'pdf' ? 'border-amber-500 bg-amber-50 shadow-md' : 'border-slate-200 bg-white hover:border-slate-300'}`}
                      >
                        <div className="flex flex-col items-center space-y-1">
                          <I.FileText className={`w-6 h-6 ${cardFormat === 'pdf' ? 'text-amber-500' : 'text-slate-400'}`} />
                          <span className={`text-xs font-bold ${cardFormat === 'pdf' ? 'text-amber-600' : 'text-slate-600'}`}>PDF</span>
                          <span className="text-[8px] text-slate-400 font-medium text-center leading-tight">Dokumen<br/>Cetak/Print</span>
                        </div>
                        {cardFormat === 'pdf' && (
                          <div className="absolute -top-1.5 -right-1.5 w-5 h-5 bg-amber-500 rounded-full flex items-center justify-center">
                            <I.CheckCircle2 className="w-3.5 h-3.5 text-white" />
                          </div>
                        )}
                      </button>
                    </div>
                  </div>
                )}
                
                {/* Info Hasil Cetak */}
                <div className="bg-blue-50 border border-blue-101 rounded-xl p-3 mb-4">
                  <div className="flex items-start space-x-2">
                    <I.Info className="w-4 h-4 text-blue-500 flex-shrink-0 mt-0.5" />
                    <div>
                      <p className="text-[10px] font-bold text-blue-700">
                        {previewAction === 'download' && cardFormat === 'jpg' ? 'Info Penyimpanan Galeri' : 'Informasi Hasil Cetak'}
                      </p>
                      <p className="text-[9px] text-blue-600 font-medium mt-0.5">
                        {previewAction === 'download' && cardFormat === 'jpg' 
                          ? 'Format JPG akan otomatis tersimpan di galeri smartphone Anda melalui menu share/save.'
                          : previewAction === 'download' && cardFormat === 'pdf'
                          ? 'Format PDF cocok untuk dicetak. File akan tersimpan di folder Downloads.'
                          : 'Kartu akan dibagikan sebagai gambar JPG berkualitas tinggi.'
                        }
                      </p>
                    </div>
                  </div>
                </div>
                
                {/* Action Buttons */}
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={()=>setShowCardPreview(false)} className="w-full bg-slate-100 text-slate-600 font-bold text-xs py-3 rounded-xl active:scale-95 transition" disabled={isProcessing}>
                    Batal
                  </button>
                  <button
                    onClick={executeCardAction}
                    disabled={isProcessing}
                    className={`w-full text-white font-bold text-xs py-3 rounded-xl transition flex items-center justify-center space-x-1.5 ${isProcessing ? 'bg-slate-400 cursor-not-allowed' : 'bg-gradient-to-r from-slate-800 to-amber-500 active:scale-95'}`}
                  >
                    {isProcessing ? (
                      <>
                        <div className="w-4 h-4 border-2 border-white/30 border-t-white rounded-full animate-spin"></div>
                        <span>Memproses...</span>
                      </>
                    ) : (
                      <>
                        {previewAction === 'download' ? (
                          cardFormat === 'pdf' ? <I.FileText className="w-4 h-4" /> : <I.Download className="w-4 h-4" />
                        ) : (
                          <I.Share2 className="w-4 h-4" />
                        )}
                        <span>
                          {previewAction === 'download'
                            ? cardFormat === 'pdf' ? 'Unduh PDF' : 'Simpan ke Galeri'
                            : 'Bagikan Sekarang'
                          }
                        </span>
                      </>
                    )}
                  </button>
                </div>
              </div>
            </div>
          )}

          {/* === MODAL CHAT === */}
          {showChatModal && activeChatUser && (
            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md z-[70] flex items-end justify-center animate-fade-in" onClick={closeChat}>
              <div className="bg-white w-full max-w-md h-[85vh] rounded-t-[32px] shadow-2xl flex flex-col animate-scale-in" onClick={e=>e.stopPropagation()}>
                <div className="p-4 border-b border-slate-101 flex items-center justify-between">
                  <div className="flex items-center space-x-3">
                    <button onClick={closeChat} className="p-1.5 rounded-full hover:bg-slate-100">
                      <I.ArrowLeft />
                    </button>
                    {activeChatUser.id === 'ALL' ? (
                      <div className="w-10 h-10 rounded-full bg-amber-100 flex items-center justify-center text-2xl">📢</div>
                    ) : (
                      <MemberAvatar user={activeChatUser} size="w-10 h-10" textSize="text-xl" />
                    )}
                    <div>
                      <h3 className="text-sm font-bold text-slate-900">{activeChatUser.name}</h3>
                      <p className="text-[10px] text-emerald-500 font-semibold">Online</p>
                    </div>
                  </div>
                </div>
                
                <div ref={chatScrollRef} className="flex-1 overflow-y-auto p-4 space-y-3 bg-slate-50/50 scrollbar-none">
                  {chatMessages.map(msg => {
                    const isMe = msg.senderId === currentUser.id;
                    return (
                      <div key={msg.id} className={`flex ${isMe ? 'justify-end' : 'justify-start'} animate-msg-in`}>
                        <div className={`max-w-[75%] p-3 shadow-md ${isMe ? 'bg-[#007AFF] text-white rounded-3xl rounded-br-lg' : 'bg-white text-slate-900 border border-slate-101 rounded-3xl rounded-bl-lg'}`}>
                          {!isMe && <p className={`text-[10px] font-bold mb-1 ${isMe ? 'text-white/80' : 'text-blue-500'}`}>{msg.senderName}</p>}
                          <p className="text-xs leading-relaxed">{msg.text}</p>
                          <p className={`text-[9px] mt-1 text-right ${isMe ? 'text-white/70' : 'text-slate-400'}`}>{new Date(msg.timestamp).toLocaleTimeString('id-ID', {hour: '2-digit', minute:'2-digit'})}</p>
                        </div>
                      </div>
                    );
                  })}
                </div>

                <form onSubmit={sendMessage} className="p-3 bg-white border-t border-slate-101 flex space-x-2">
                  <input
                    type="text"
                    value={newMessage}
                    onChange={(e)=>setNewMessage(e.target.value)}
                    placeholder="Ketik pesan..."
                    className="flex-1 bg-slate-100 border border-slate-200 rounded-full px-4 py-2.5 text-xs text-slate-800 placeholder:text-slate-400 focus:outline-none focus:ring-2 focus:ring-amber-400/30 focus:border-amber-400 focus:bg-white transition-all duration-200"
                    required
                  />
                  <button type="submit" className="bg-[#007AFF] text-white p-2.5 rounded-full shadow-md active:scale-90 transition">
                    <I.Send />
                  </button>
                </form>
              </div>
            </div>
          )}

          {/* === MODAL NOTIFIKASI PESAN MASUK (POP-UP KONFIRMASI) === */}
          {incomingMessageAlert && (
            <div className="absolute inset-0 bg-slate-900/80 backdrop-blur-md z-[80] flex items-center justify-center p-4 animate-fade-in">
              <div className="bg-white rounded-3xl p-6 w-full max-w-xs shadow-2xl text-center animate-scale-in">
                <div className="w-16 h-16 rounded-full bg-amber-100 flex items-center justify-center mx-auto mb-4 text-3xl">📩</div>
                <h3 className="text-base font-black text-slate-900 mb-1">Pesan Baru Masuk!</h3>
                <p className="text-xs text-slate-500 mb-4">Anda mendapat pesan baru dari <b className="text-slate-700">{incomingMessageAlert.senderName}</b></p>
                <div className="bg-slate-50 border border-slate-200 rounded-2xl p-3 mb-4 text-left">
                  <p className="text-xs font-semibold text-slate-800 line-clamp-3">"{incomingMessageAlert.text}"</p>
                </div>
                <div className="grid grid-cols-2 gap-2">
                  <button onClick={() => setIncomingMessageAlert(null)} className="w-full bg-slate-100 text-slate-600 font-bold text-xs py-3 rounded-xl active:scale-95 transition">Nanti Saja</button>
                  <button 
                    onClick={() => { 
                      openChat(incomingMessageAlert.recipientUser); 
                      setIncomingMessageAlert(null); 
                    }} 
                    className="w-full bg-gradient-to-r from-blue-500 to-indigo-500 text-white font-bold text-xs py-3 rounded-xl active:scale-95 transition"
                  >
                    Baca Pesan
                  </button>
                </div>
              </div>
            </div>
          )}

        </div>
      );
    }
    ReactDOM.createRoot(document.getElementById('root')).render(<App />);
  </script>
  
  <!-- Script Registrasi PWA Service Worker -->
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('/sw.js').then(reg => console.log('SW registered:', reg.scope)).catch(err => console.error('SW registration failed:', err));
      });
    }
  </script>
</body>
</html>
